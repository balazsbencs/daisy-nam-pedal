name: Pages

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'tools/check_site.py'
      - 'tests/site/**'
      - '.github/workflows/pages.yml'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'tools/check_site.py'
      - 'tests/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 -m unittest tests/site/test_check_site.py -v
      - run: python3 tools/check_site.py site
      - run: node --check site/assets/site.js
      - run: node --check site/assets/simulator.js
      - run: node --test tests/site/simulator-state.test.mjs

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
