name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Compute the next semver from conventional commits
  # ─────────────────────────────────────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      new_tag:      ${{ steps.bump.outputs.new_tag }}
      new_version:  ${{ steps.bump.outputs.new_version }}
      has_release:  ${{ steps.bump.outputs.has_release }}

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          # Find the most recent semver tag (default to v0.0.0)
          LAST_TAG=$(git tag -l 'v[0-9]*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits since $LAST_TAG — skipping release."
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse current version
          VERSION="${LAST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Determine bump type (highest wins)
          BUMP=""
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '(\!:)|BREAKING[- ]CHANGE'; then
              BUMP="major"; break
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$msg" | grep -qE '^(fix|perf|refactor)(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && [ "$BUMP" != "minor" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ -z "$BUMP" ]; then
            echo "No releasable commits since $LAST_TAG (only chore/docs/ci) — skipping release."
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Last tag:    $LAST_TAG"
          echo "Bump type:   $BUMP"
          echo "New version: v$NEW_VERSION"

          echo "new_tag=v${NEW_VERSION}"     >> $GITHUB_OUTPUT
          echo "new_version=${NEW_VERSION}"  >> $GITHUB_OUTPUT
          echo "has_release=true"            >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # 2. Build firmware (Linux cross-compilation)
  # ─────────────────────────────────────────────────────────────
  build-firmware:
    name: Build Firmware
    needs: version
    if: needs.version.outputs.has_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply submodule patches
        run: sh tools/apply_submodule_patches.sh

      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '15.2.Rel1'  # official Arm toolchain; apt's gcc-arm-none-eabi newlib-nano is missing __ssputws_r

      - name: Get submodule commit hashes
        id: submodule-hashes
        run: |
          echo "libdaisy=$(git rev-parse HEAD:third_party/libDaisy)" >> $GITHUB_OUTPUT
          echo "daisysp=$(git rev-parse HEAD:third_party/DaisySP)"   >> $GITHUB_OUTPUT

      - name: Cache libDaisy build
        id: cache-libdaisy
        uses: actions/cache@v4
        with:
          path: third_party/libDaisy/build
          key: libdaisy-ubuntu-${{ steps.submodule-hashes.outputs.libdaisy }}-arm15.2.Rel1

      - name: Build libDaisy
        if: steps.cache-libdaisy.outputs.cache-hit != 'true'
        run: make -C third_party/libDaisy -j$(nproc)

      - name: Cache DaisySP build
        id: cache-daisysp
        uses: actions/cache@v4
        with:
          path: third_party/DaisySP/build
          key: daisysp-ubuntu-${{ steps.submodule-hashes.outputs.daisysp }}-arm15.2.Rel1

      - name: Build DaisySP
        if: steps.cache-daisysp.outputs.cache-hit != 'true'
        run: make -C third_party/DaisySP -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc)

      - name: Print flash/RAM usage
        run: arm-none-eabi-size build/NamPlatform.elf

      - name: Package firmware artifacts
        env:
          VERSION: ${{ needs.version.outputs.new_version }}
        run: |
          mkdir -p dist
          cp build/NamPlatform.bin "dist/daisy-nam-pedal-firmware-v${VERSION}.bin"
          cp build/NamPlatform.elf "dist/daisy-nam-pedal-firmware-v${VERSION}.elf"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 3. Tag, generate changelog, publish GitHub release
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [version, build-firmware]
    if: needs.version.outputs.has_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        env:
          NEW_TAG: ${{ needs.version.outputs.new_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Generate changelog
        env:
          NEW_TAG: ${{ needs.version.outputs.new_tag }}
        run: |
          # Conventional-commit changelog since the previous semver tag.
          PREV_TAG=$(git tag -l 'v[0-9]*' --sort=-version:refname | grep -v "^${NEW_TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "## ${NEW_TAG}"
            echo
            git log "$RANGE" --no-merges --pretty=format:'- %s (%h)' \
              -E --grep='^(feat|fix|perf|refactor)(\(.+\))?(\!)?:' || true
            echo
          } > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.version.outputs.new_tag }}
          name:       ${{ needs.version.outputs.new_tag }}
          body_path:  CHANGELOG_RELEASE.md
          files:      dist/*
          draft:      false
          prerelease: false
